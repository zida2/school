<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Étudiant - ERP Universitaire</title>
    <link rel="stylesheet" href="css/dashboard-dark-premium.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 20s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        .inscription-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 48px;
            position: relative;
            z-index: 1;
        }

        .inscription-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .inscription-title {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .inscription-subtitle {
            color: #64748b;
            font-size: 16px;
        }

        .alert {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: none;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 500;
        }

        .alert.error {
            background: #fee;
            color: #c00;
            border: 1px solid #fcc;
            display: flex;
        }

        .alert.success {
            background: #efe;
            color: #0a0;
            border: 1px solid #cfc;
            display: flex;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            margin-bottom: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: #334155;
        }

        .form-label .required {
            color: #ef4444;
            margin-left: 4px;
        }

        .form-input, .form-select {
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: white;
            color: #1e293b;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-select {
            cursor: pointer;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: #764ba2;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .inscription-container {
                padding: 32px 24px;
            }

            .form-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .inscription-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div id="particles"></div>

    <div class="inscription-container">
        <div class="inscription-header">
            <h1 class="inscription-title">📝 Inscription Étudiant</h1>
            <p class="inscription-subtitle">Remplissez le formulaire pour créer votre demande d'inscription</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <form id="inscriptionForm" onsubmit="handleInscription(event)">
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">Nom <span class="required">*</span></label>
                    <input type="text" class="form-input" id="nom" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Prénom <span class="required">*</span></label>
                    <input type="text" class="form-input" id="prenom" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Email <span class="required">*</span></label>
                    <input type="email" class="form-input" id="email" placeholder="votre.email@example.bf" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Téléphone <span class="required">*</span></label>
                    <input type="tel" class="form-input" id="telephone" placeholder="+226 XX XX XX XX" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Date de naissance <span class="required">*</span></label>
                    <input type="date" class="form-input" id="date_naissance" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Lieu de naissance <span class="required">*</span></label>
                    <input type="text" class="form-input" id="lieu_naissance" required>
                </div>

                <div class="form-group full-width">
                    <label class="form-label">Adresse complète <span class="required">*</span></label>
                    <input type="text" class="form-input" id="adresse" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Lycée de provenance <span class="required">*</span></label>
                    <input type="text" class="form-input" id="lycee_provenance" placeholder="Ex: Lycée Municipal de Ouagadougou" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Ville d'origine <span class="required">*</span></label>
                    <input type="text" class="form-input" id="ville_origine" placeholder="Ex: Ouagadougou" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Série du BAC <span class="required">*</span></label>
                    <select class="form-select" id="serie_bac" required>
                        <option value="">-- Sélectionnez --</option>
                        <option value="A">Série A (Littéraire)</option>
                        <option value="C">Série C (Mathématiques)</option>
                        <option value="D">Série D (Sciences)</option>
                        <option value="E">Série E (Technique)</option>
                        <option value="F">Série F (Industriel)</option>
                        <option value="G">Série G (Gestion)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Année d'obtention du BAC <span class="required">*</span></label>
                    <input type="number" class="form-input" id="annee_bac" min="2000" max="2026" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Mention du BAC <span class="required">*</span></label>
                    <select class="form-select" id="mention_bac" required>
                        <option value="">-- Sélectionnez --</option>
                        <option value="Passable">Passable</option>
                        <option value="Assez Bien">Assez Bien</option>
                        <option value="Bien">Bien</option>
                        <option value="Très Bien">Très Bien</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Filière souhaitée <span class="required">*</span></label>
                    <select class="form-select" id="filiere" required>
                        <option value="">-- Sélectionnez --</option>
                        <option value="Informatique">Informatique</option>
                        <option value="Gestion">Gestion</option>
                        <option value="Droit">Droit</option>
                        <option value="Économie">Économie</option>
                        <option value="Lettres">Lettres</option>
                        <option value="Sciences">Sciences</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                Soumettre ma demande d'inscription
            </button>
        </form>

        <div class="back-link">
            <a href="index.html">← Retour à la connexion</a>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        // Créer les particules animées
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = (Math.random() * 10 + 15) + 's';
            particlesContainer.appendChild(particle);
        }

        function showAlert(message, type = 'error') {
            const alertBox = document.getElementById('alertBox');
            alertBox.className = 'alert ' + type;
            alertBox.innerHTML = `<span>${type === 'error' ? '❌' : '✅'}</span><span>${message}</span>`;
            alertBox.style.display = 'flex';
            setTimeout(() => alertBox.style.display = 'none', 8000);
        }

        async function handleInscription(e) {
            e.preventDefault();
            console.log('📝 Soumission du formulaire d\'inscription...');
            
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;

            // Désactiver le bouton
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span>Envoi en cours...';

            // Récupérer les données du formulaire
            const formData = {
                nom: document.getElementById('nom').value.trim(),
                prenom: document.getElementById('prenom').value.trim(),
                email: document.getElementById('email').value.trim(),
                telephone: document.getElementById('telephone').value.trim(),
                date_naissance: document.getElementById('date_naissance').value,
                lieu_naissance: document.getElementById('lieu_naissance').value.trim(),
                adresse: document.getElementById('adresse').value.trim(),
                lycee_provenance: document.getElementById('lycee_provenance').value.trim(),
                ville_origine: document.getElementById('ville_origine').value.trim(),
                serie_bac: document.getElementById('serie_bac').value,
                annee_bac: parseInt(document.getElementById('annee_bac').value),
                mention_bac: document.getElementById('mention_bac').value,
                filiere_souhaitee: document.getElementById('filiere').value
            };

            console.log('📦 Données à envoyer:', formData);

            try {
                const response = await fetch(`${API_BASE_URL}/api/demandes-inscription/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();
                console.log('📥 Réponse serveur:', data);

                if (response.ok) {
                    console.log('✅ Inscription réussie');
                    submitBtn.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
                    submitBtn.innerHTML = '✓ Demande envoyée avec succès !';
                    showAlert('Votre demande d\'inscription a été envoyée avec succès ! Vous recevrez un email une fois votre compte validé par l\'administration.', 'success');
                    
                    // Réinitialiser le formulaire après 3 secondes
                    setTimeout(() => {
                        document.getElementById('inscriptionForm').reset();
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = originalText;
                        submitBtn.style.background = '';
                    }, 3000);
                } else {
                    console.error('❌ Erreur serveur:', data);
                    let errorMessage = 'Une erreur est survenue lors de l\'envoi de votre demande.';
                    
                    if (data.email && data.email.includes('existe déjà')) {
                        errorMessage = 'Cet email est déjà utilisé. Veuillez utiliser une autre adresse email.';
                    } else if (data.detail) {
                        errorMessage = data.detail;
                    } else if (typeof data === 'object') {
                        errorMessage = Object.values(data).flat().join(' ');
                    }
                    
                    showAlert(errorMessage, 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalText;
                }
            } catch (err) {
                console.error('❌ Erreur réseau:', err);
                showAlert('Erreur de connexion au serveur. Veuillez vérifier votre connexion internet et réessayer.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        }
    </script>
</body>
</html>
