# Configuration Docker pour le développement local
version: '3.8'

services:
  # Base de données PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: unierp_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: erp_universitaire_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Backend Django en mode développement
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unierp_backend_dev
    restart: unless-stopped
    environment:
      - SECRET_KEY=django-insecure-dev-key-for-development-only
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - DB_NAME=erp_universitaire_dev
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - ADMIN_EMAIL=admin@unierp.bf
      - ADMIN_PASSWORD=Admin2026
    volumes:
      - ./backend:/app
      - static_volume_dev:/app/staticfiles
      - media_volume_dev:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - db
    command: python manage.py runserver 0.0.0.0:8000

volumes:
  postgres_data_dev:
  static_volume_dev:
  media_volume_dev:

networks:
  default:
    name: unierp_network_dev
