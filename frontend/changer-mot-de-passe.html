<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Changer mon mot de passe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .change-password-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-section i {
            font-size: 60px;
            color: #667eea;
            margin-bottom: 15px;
        }
        .logo-section h2 {
            color: #333;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .logo-section p {
            color: #666;
            font-size: 14px;
        }
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-change {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            color: white;
            width: 100%;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        .btn-change:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .alert {
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .password-requirements {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
        }
        .password-field {
            position: relative;
        }
    </style>
</head>
<body>
    <div class="change-password-card">
        <div class="logo-section">
            <i class="fas fa-key"></i>
            <h2>Changer mon mot de passe</h2>
            <p>Sécurisez votre compte avec un nouveau mot de passe</p>
        </div>

        <div id="alertContainer"></div>

        <form id="changePasswordForm">
            <div class="mb-3 password-field">
                <label for="old_password" class="form-label">Mot de passe actuel <span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="old_password" required>
                <i class="fas fa-eye password-toggle" onclick="togglePassword('old_password')"></i>
            </div>

            <div class="mb-3 password-field">
                <label for="new_password" class="form-label">Nouveau mot de passe <span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="new_password" required minlength="8">
                <i class="fas fa-eye password-toggle" onclick="togglePassword('new_password')"></i>
                <div class="password-requirements">
                    Minimum 8 caractères
                </div>
            </div>

            <div class="mb-3 password-field">
                <label for="confirm_password" class="form-label">Confirmer le nouveau mot de passe <span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="confirm_password" required minlength="8">
                <i class="fas fa-eye password-toggle" onclick="togglePassword('confirm_password')"></i>
            </div>

            <button type="submit" class="btn btn-change">
                <i class="fas fa-check me-2"></i>Changer mon mot de passe
            </button>
        </form>

        <div class="back-link">
            <a href="javascript:history.back()"><i class="fas fa-arrow-left me-2"></i>Retour</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://wendlasida.pythonanywhere.com/api';

        // Toggle password visibility
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const icon = field.nextElementSibling;
            
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const oldPassword = document.getElementById('old_password').value;
            const newPassword = document.getElementById('new_password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            // Vérifier que les mots de passe correspondent
            if (newPassword !== confirmPassword) {
                showAlert('danger', 'Les nouveaux mots de passe ne correspondent pas');
                return;
            }

            // Vérifier la longueur
            if (newPassword.length < 8) {
                showAlert('danger', 'Le nouveau mot de passe doit contenir au moins 8 caractères');
                return;
            }

            // Récupérer le token
            const token = localStorage.getItem('token');
            if (!token) {
                showAlert('danger', 'Vous devez être connecté pour changer votre mot de passe');
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
                return;
            }

            try {
                const response = await fetch(`${API_URL}/auth/change-password/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        old_password: oldPassword,
                        new_password: newPassword
                    })
                });

                if (response.ok) {
                    showAlert('success', 'Mot de passe changé avec succès! Redirection...');
                    document.getElementById('changePasswordForm').reset();
                    setTimeout(() => {
                        history.back();
                    }, 2000);
                } else {
                    const error = await response.json();
                    showAlert('danger', error.detail || error.old_password || 'Erreur lors du changement de mot de passe');
                }
            } catch (error) {
                showAlert('danger', 'Erreur de connexion au serveur');
            }
        });

        function showAlert(type, message) {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }

        // Vérifier si l'utilisateur est connecté
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (!token) {
                showAlert('warning', 'Vous devez être connecté. Redirection...');
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
