<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <title>Inscription Professeur - ERP Universitaire</title>
    <link rel="stylesheet" href="css/dashboard-dark-premium.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .inscription-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 48px;
        }

        .inscription-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .inscription-title {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .inscription-subtitle {
            color: #64748b;
            font-size: 16px;
        }

        .alert {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: none;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 500;
        }

        .alert.error {
            background: #fee;
            color: #c00;
            border: 1px solid #fcc;
            display: flex;
        }

        .alert.success {
            background: #efe;
            color: #0a0;
            border: 1px solid #cfc;
            display: flex;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #334155;
        }

        .form-label .required {
            color: #ef4444;
            margin-left: 4px;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: white;
            color: #1e293b;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-select {
            cursor: pointer;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: #764ba2;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="inscription-container">
        <div class="inscription-header">
            <h1 class="inscription-title">👨‍🏫 Inscription Professeur</h1>
            <p class="inscription-subtitle">Rejoignez notre équipe pédagogique</p>
        </div>

        <div id="alertBox" class="alert"></div>

        <form id="inscriptionForm">
            <div class="form-group">
                <label class="form-label">Nom <span class="required">*</span></label>
                <input type="text" class="form-input" id="nom" required>
            </div>

            <div class="form-group">
                <label class="form-label">Prénom <span class="required">*</span></label>
                <input type="text" class="form-input" id="prenom" required>
            </div>

            <div class="form-group">
                <label class="form-label">Email <span class="required">*</span></label>
                <input type="email" class="form-input" id="email" placeholder="votre.email@example.bf" required>
            </div>

            <div class="form-group">
                <label class="form-label">Téléphone</label>
                <input type="tel" class="form-input" id="telephone" placeholder="+226 XX XX XX XX">
            </div>

            <div class="form-group">
                <label class="form-label">Filière enseignée <span class="required">*</span></label>
                <select class="form-select" id="filiere_enseignee" required>
                    <option value="">-- Sélectionnez une filière --</option>
                </select>
            </div>

            <button type="submit" class="btn-submit" id="submitBtn">
                Soumettre ma candidature
            </button>
        </form>

        <div class="back-link">
            <a href="index.html">← Retour à la connexion</a>
        </div>
    </div>

    <script>
        (function() {
            'use strict';
            
            // Configuration API
            var API_BASE_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
                ? 'http://localhost:8000'
                : 'https://wendlasida.pythonanywhere.com';
            
            console.log('🌐 API:', API_BASE_URL);
            
            function showAlert(message, type) {
                var alertBox = document.getElementById('alertBox');
                alertBox.className = 'alert ' + type;
                alertBox.innerHTML = '<span>' + (type === 'error' ? '❌' : '✅') + '</span><span>' + message + '</span>';
                alertBox.style.display = 'flex';
                setTimeout(function() {
                    alertBox.style.display = 'none';
                }, 8000);
            }
            
            function loadFilieres() {
                var url = API_BASE_URL + '/api/filieres/';
                console.log('📡 Chargement:', url);
                
                fetch(url, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                })
                .then(function(response) {
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return response.json();
                })
                .then(function(data) {
                    console.log('✅ Filières:', data);
                    
                    // L'API retourne un objet paginé avec "results"
                    var filieres = data.results || data;
                    
                    var select = document.getElementById('filiere_enseignee');
                    select.innerHTML = '<option value="">-- Sélectionnez une filière --</option>';
                    
                    if (filieres && filieres.length > 0) {
                        filieres.forEach(function(filiere) {
                            var option = document.createElement('option');
                            option.value = filiere.id;
                            option.textContent = filiere.code + ' - ' + filiere.nom;
                            select.appendChild(option);
                        });
                        console.log('✅ ' + filieres.length + ' filières chargées');
                    } else {
                        showAlert('Aucune filière disponible', 'error');
                    }
                })
                .catch(function(error) {
                    console.error('❌ Erreur:', error);
                    showAlert('Impossible de charger les filières', 'error');
                });
            }
            
            function handleInscription(e) {
                e.preventDefault();
                
                var submitBtn = document.getElementById('submitBtn');
                var originalText = submitBtn.innerHTML;
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner"></span>Envoi en cours...';

                var formData = {
                    nom: document.getElementById('nom').value.trim(),
                    prenom: document.getElementById('prenom').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    telephone: document.getElementById('telephone').value.trim(),
                    filiere_enseignee: parseInt(document.getElementById('filiere_enseignee').value)
                };

                fetch(API_BASE_URL + '/api/demandes-inscription-professeur/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                })
                .then(function(response) {
                    return response.json().then(function(data) {
                        return { ok: response.ok, data: data };
                    });
                })
                .then(function(result) {
                    if (result.ok) {
                        submitBtn.style.background = 'linear-gradient(135deg, #10b981 0%, #059669 100%)';
                        submitBtn.innerHTML = '✓ Candidature envoyée !';
                        showAlert('Votre candidature a été envoyée avec succès ! Vous recevrez un email une fois validée.', 'success');
                        
                        setTimeout(function() {
                            document.getElementById('inscriptionForm').reset();
                            submitBtn.disabled = false;
                            submitBtn.innerHTML = originalText;
                            submitBtn.style.background = '';
                        }, 3000);
                    } else {
                        var errorMessage = 'Une erreur est survenue';
                        var data = result.data;
                        
                        if (data.email && Array.isArray(data.email)) {
                            errorMessage = data.email[0];
                        } else if (data.email && data.email.indexOf('existe déjà') !== -1) {
                            errorMessage = 'Cet email est déjà utilisé';
                        } else if (data.detail) {
                            errorMessage = data.detail;
                        }
                        
                        showAlert(errorMessage, 'error');
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = originalText;
                    }
                })
                .catch(function(error) {
                    console.error('❌ Erreur:', error);
                    showAlert('Erreur de connexion au serveur', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalText;
                });
            }
            
            // Initialisation
            document.getElementById('inscriptionForm').addEventListener('submit', handleInscription);
            
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', loadFilieres);
            } else {
                loadFilieres();
            }
        })();
    </script>
</body>
</html>
