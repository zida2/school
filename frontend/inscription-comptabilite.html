<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Service Comptabilité</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .inscription-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-section i {
            font-size: 60px;
            color: #00f2fe;
            margin-bottom: 15px;
        }
        .logo-section h2 {
            color: #333;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .logo-section p {
            color: #666;
            font-size: 14px;
        }
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #00f2fe;
            box-shadow: 0 0 0 0.2rem rgba(0, 242, 254, 0.25);
        }
        .btn-inscription {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            color: white;
            width: 100%;
            margin-top: 20px;
            transition: transform 0.2s;
        }
        .btn-inscription:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4);
        }
        .alert {
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #00f2fe;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="inscription-card">
        <div class="logo-section">
            <i class="fas fa-calculator"></i>
            <h2>Service Comptabilité</h2>
            <p>Inscription au service de comptabilité</p>
        </div>

        <div id="alertContainer"></div>

        <form id="inscriptionForm">
            <div class="mb-3">
                <label for="nom" class="form-label">Nom <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="nom" required>
            </div>

            <div class="mb-3">
                <label for="prenom" class="form-label">Prénom <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="prenom" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                <input type="email" class="form-control" id="email" required>
            </div>

            <div class="mb-3">
                <label for="telephone" class="form-label">Téléphone</label>
                <input type="tel" class="form-control" id="telephone">
            </div>

            <div class="mb-3">
                <label for="poste_souhaite" class="form-label">Poste souhaité</label>
                <input type="text" class="form-control" id="poste_souhaite" value="Comptable">
            </div>

            <button type="submit" class="btn btn-inscription">
                <i class="fas fa-paper-plane me-2"></i>Envoyer ma demande
            </button>
        </form>

        <div class="back-link">
            <a href="accueil.html"><i class="fas fa-arrow-left me-2"></i>Retour à l'accueil</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://wendlasida.pythonanywhere.com/api';

        document.getElementById('inscriptionForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                nom: document.getElementById('nom').value,
                prenom: document.getElementById('prenom').value,
                email: document.getElementById('email').value,
                telephone: document.getElementById('telephone').value,
                poste_souhaite: document.getElementById('poste_souhaite').value
            };

            try {
                const response = await fetch(`${API_URL}/demandes-inscription-comptabilite/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    showAlert('success', 'Demande envoyée avec succès! Vous recevrez un email une fois votre compte validé.');
                    document.getElementById('inscriptionForm').reset();
                } else {
                    const error = await response.json();
                    showAlert('danger', 'Erreur: ' + (error.detail || 'Une erreur est survenue'));
                }
            } catch (error) {
                showAlert('danger', 'Erreur de connexion au serveur');
            }
        });

        function showAlert(type, message) {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
